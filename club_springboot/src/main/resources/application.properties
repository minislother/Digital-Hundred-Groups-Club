server.port=8081

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/club}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

logging.level.com.chinahitech.shop.mapper=debug
spring.thymeleaf.check-template-location=false
upload-dir= upload/

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.chinahitech.shop.bean
mybatis.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.chinahitech.shop.bean,com.chinahitech.shop.bean.notAddedToDatabase
mybatis-plus.configuration.map-underscore-to-camel-case=true

#redis数据库索引 默认是0
spring.redis.database=0
#redis服务器地址
spring.redis.host=127.0.0.1
#redis连接端口
spring.redis.port=6379
#redis连接密码 默认为空
spring.redis.password=
#连接池最大连接数 使用负值表示没有限制
spring.redis.jedis.pool.max-active=200
#连接池最大阻塞时间 使用负值表示没有限制
spring.redis.jedis.pool.max-wait=-1ms
#连接池中的最大空闲连接
spring.redis.jedis.pool.max-idle=200
#连接池中的最小空闲连接
spring.redis.jedis.pool.min-idle=0
#连接超时时间
spring.redis.connect-timeout=5000

# Kafka 配置
spring.kafka.bootstrap-servers=localhost:9092
app.kafka.enabled=false
app.kafka.listener.auto-startup=false
app.kafka.listener.concurrency=1

# 生产者
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3

# 消费者
spring.kafka.consumer.group-id=activity-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# 主题名称
spring.kafka.topic.activity=activity_topic
spring.kafka.topic.activity-cache=activity_cache_topic
spring.kafka.topic.group=group_topic
spring.kafka.topic.group-cache=group_cache_topic
spring.kafka.topic.individual-group=individual_group_topic
spring.kafka.topic.individual-activity=individual_activity_topic
spring.kafka.topic.user-import=user_import_topic

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
#logging.file.path= D:/var/log
